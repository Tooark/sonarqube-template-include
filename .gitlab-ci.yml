spec:
  inputs:
    language:
      description: "Program Language for Scan and Quality Gate"
      type: string
      default: "node"
      options:
        - maven # Maven
        - gradle # Gradle
        - dotnet # C#/.NET
        - python # Python
        - node # Node.js
        - other # Other
    stage:
      description: "Stage to run Sonarqube"
      type: string
      default: sonarqube
    environment:
      description: "Environment for Scan and Quality Gate"
      type: string
      default: sonarqube
    image:
      description: "Docker image to use for the job"
      type: string
      default: "public.ecr.aws/n6a9k4a7/deploy:1-sonarqube"
    # Sonarqube Quality Gate variables
    quality_gate:
      description: "Wait for Quality Gate"
      type: boolean
      default: true
    quality_gate_timeout:
      description: "Timeout for Quality Gate"
      type: string
      default: "300"
    #.NET variables
    dotnet_version:
      description: ".NET version"
      type: string
      default: "8.0"
    dotnet_path_sln_or_csproj:
      description: "Path for .sln or .csproj"
      type: string
      default: ""
---
# Variables Global
variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
  GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  IMAGE_MAVEN: "maven:$[[inputs.dotnet_version]]"
  IMAGE_GRADLE: "gradle:$[[inputs.dotnet_version]]"
  IMAGE_DOTNET: "mcr.microsoft.com/dotnet/sdk:$[[inputs.dotnet_version]]"
  IMAGE_SCAN: "public.ecr.aws/n6a9k4a7/deploy:1-sonarqube"

# Define stages of the pipeline
stages:
  - $[[ inputs.stage ]]

########################################
# ARM64
sonarqube:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "node"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image: public.ecr.aws/n6a9k4a7/deploy:1-sonarqube
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - >
      sonar-scanner
      -Dsonar.host.url="$SONAR_HOST_URL"
      -Dsonar.token="$SONAR_TOKEN"
      -Dsonar.projectKey="$SONAR_PROJECT_KEY"
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.qualitygate.wait=$[[ inputs.quality_gate ]]
      -Dsonar.qualitygate.timeout=$[[ inputs.quality_gate_timeout ]]

#########################################
# AMD64
sonarqube_amd64:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "node_amd64"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - >
      sonar-scanner
      -Dsonar.host.url="$SONAR_HOST_URL"
      -Dsonar.token="$SONAR_TOKEN"
      -Dsonar.projectKey="$SONAR_PROJECT_KEY"
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.qualitygate.wait=$[[ inputs.quality_gate ]]
      -Dsonar.qualitygate.timeout=$[[ inputs.quality_gate_timeout ]]
  tags:
    - amd64

########################################
# Python
sonar_python:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "python"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - >
      sonar-scanner
      -Dsonar.host.url="$SONAR_HOST_URL"
      -Dsonar.token="$SONAR_TOKEN"
      -Dsonar.projectKey="$SONAR_PROJECT_KEY"
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.qualitygate.wait=$[[ inputs.quality_gate ]]
      -Dsonar.qualitygate.timeout=$[[ inputs.quality_gate_timeout ]]

########################################
# .NET
sonar_dotnet1:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "dotnet"'
  image: mcr.microsoft.com/dotnet/sdk:$[[inputs.dotnet_version]]-alpine
  stage: $[[ inputs.stage ]]
  environment: $[[ inputs.environment ]]
  before_script:
    - apk add --no-cache bash curl jq
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$HOME/.dotnet/tools:$PATH"
    # Verifica se as variáveis obrigatórias estão definidas
    - '[ -n "${SONAR_HOST_URL:-}" ] || { echo "ERROR: SONAR_HOST_URL is not defined"; exit 1; }'
    - '[ -n "${SONAR_TOKEN:-}" ]    || { echo "ERROR: SONAR_TOKEN is not defined"; exit 1; }'
    - '[ -n "${SONAR_PROJECT_KEY:-}" ] || { echo "ERROR: SONAR_PROJECT_KEY is not defined"; exit 1; }'

  script:
    # 1) Inicia a análise (apontando para OpenCover)
    - >
      dotnet-sonarscanner begin
      /k:"$SONAR_PROJECT_KEY"
      /d:sonar.host.url="$SONAR_HOST_URL"
      /d:sonar.token="$SONAR_TOKEN"
      /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml"
      /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx"

    # 2) Build da solução/projeto (utilizando --no-incremental para garantir que tudo seja recompilado)
    - >
      dotnet build $[[inputs.dotnet_path_sln_or_csproj]]
      --no-incremental

    # 3) Testes + cobertura (GERA DOIS FORMATOS: cobertura + opencover)
    - >
      dotnet test --configuration Debug
      --results-directory TestResults
      --collect:"XPlat Code Coverage;Format=cobertura,opencover"

    # 4) Consolida 1 arquivo Cobertura com nome estável para o GitLab
    - >
      COB_FILE=$(find TestResults -name 'coverage.cobertura.xml' | head -n 1) &&
      cp "$COB_FILE" coverage.cobertura.xml

    # 5) Finaliza a análise e aguarda o Quality Gate (timeout de 5 minutos)
    - >
      dotnet-sonarscanner end
      /d:sonar.token="$SONAR_TOKEN"
      /d:sonar.qualitygate.wait=$[[ inputs.quality_gate ]]
      /d:sonar.qualitygate.timeout=$[[ inputs.quality_gate_timeout ]]

  artifacts:
    when: always
    paths:
      - TestResults/**
      - coverage.cobertura.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml

########################################
# Maven SonarQube Scan Job
sonar_maven:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "maven"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image: $IMAGE_MAVEN
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
    GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
  allow_failure: true

########################################
# Gradle SonarQube Scan Job
sonar_gradle:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "gradle"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image: $IMAGE_GRADLE
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
    GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script: gradle sonar
  allow_failure: true

########################################
# .NET SonarQube Scan Job
sonar_dotnet:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "dotnet"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image: $IMAGE_DOTNET
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
    GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - "dotnet tool install --global dotnet-sonarscanner"
    - 'export PATH="$PATH:$HOME/.dotnet/tools"'
    - 'dotnet sonarscanner begin /k:"devops_iac_0-ditie-devops_8dfb2e16-4c9c-4ec5-b241-b298f15062bc" /d:sonar.token="$SONAR_TOKEN" /d:"sonar.host.url=$SONAR_HOST_URL" '
    - "dotnet build"
    - 'dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"'
  allow_failure: true

#########################################
# SonarQube Scan Job (Generic)
sonar_generic:
  rules:
    - if: '"$[[ inputs.language | expand_vars ]]" == "python"'
    - if: '"$[[ inputs.language | expand_vars ]]" == "node"'
    - if: '"$[[ inputs.language | expand_vars ]]" == "other"'
  environment: $[[ inputs.environment ]]
  stage: $[[ inputs.stage ]]
  image: $IMAGE_SCAN
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
    GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true
